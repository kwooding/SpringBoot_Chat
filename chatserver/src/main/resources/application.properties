spring.application.name=chatserver
server.port=8081
debug=true

# Used for the connection with docker mapped to thsi port to be able to connect to the database
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5433/chatserver}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:secret}
spring.datasource.driver-class-name=org.postgresql.Driver

#jpa settings used to match entities to tables and crash if mismatch to catch errors and print SQL queires to the console so we can see what JPA is doing
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect



#Flyway tells spring to run flyway migrations on app startup
spring.flyway.enabled=true
spring.jpa.defer-datasource-initialization=false
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration
logging.level.org.flywaydb=DEBUG
logging.level.org.springframework.boot.autoconfigure.flyway=DEBUG

app.jwt.secret=ThisIsADevelopmentSecretKeyMakeItLongerAndRandomInProduction12345
app.jwt.expiration-ms=86400000

# Redis: labelling the hsot and port 
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}

# JWT env variables with locla default
app.jwt.secret=${JWT_SECRET:ThisIsADevelopmentSecretKeyMakeItLongerAndRandomInProduction12345}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

#Actuator for exposing health endpoints and details shown there
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
management.endpoint.health.probes.enabled=true