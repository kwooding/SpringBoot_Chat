apiVersion: apps/v1
kind: Deployment
metadata:
  name: chatserver
spec:
  replicas: 2                      
  selector:
    matchLabels:
      app: chatserver
  template:
    metadata:
      labels:
        app: chatserver
    spec:
      containers:
        - name: chatserver
          image: chatserver-app1:latest
          imagePullPolicy: IfNotPresent   
          ports:
            - containerPort: 8081
          env:
            - name: DB_URL
              valueFrom:
                configMapKeyRef:
                  name: chatserver-config
                  key: DB_URL
            - name: DB_USERNAME
              valueFrom:
                configMapKeyRef:
                  name: chatserver-config
                  key: DB_USERNAME
            - name: REDIS_HOST
              valueFrom:
                configMapKeyRef:
                  name: chatserver-config
                  key: REDIS_HOST
            - name: REDIS_PORT
              valueFrom:
                configMapKeyRef:
                  name: chatserver-config
                  key: REDIS_PORT
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: chatserver-secret
                  key: DB_PASSWORD
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: chatserver-secret
                  key: JWT_SECRET
          #Checking the liveliness and readiness wil chekc for 3 consective failures before restart
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8081
            initialDelaySeconds: 0
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8081
            initialDelaySeconds: 0
            periodSeconds: 10
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8081
            failureThreshold: 30
            periodSeconds: 10
          # Showing resource allocation for pods with minimum and maximum allowed for each
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 500m
              memory: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: chatserver
spec:
  selector:
    app: chatserver
  ports:
    - port: 8081
      targetPort: 8081